<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShelfSuite Desktop Mockup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
}

/* Windows 11 wallpaper - dark bloom style */
.desktop {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a1628 0%, #0f2847 20%, #1a1a3e 40%, #2d1b4e 55%, #1a1a3e 70%, #0f2847 85%, #0a1628 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Subtle bloom effect */
.desktop::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 30%;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(56, 100, 180, 0.15) 0%, transparent 70%);
    pointer-events: none;
}

.desktop::after {
    content: '';
    position: absolute;
    top: 40%;
    right: 25%;
    width: 400px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(120, 60, 150, 0.1) 0%, transparent 70%);
    pointer-events: none;
}

/* Desktop icons on the left */
.desktop-icons {
    position: absolute;
    top: 30px;
    left: 30px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.desktop-icon {
    width: 72px;
    height: 78px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-radius: 4px;
    cursor: default;
}

.desktop-icon svg {
    width: 36px;
    height: 36px;
    opacity: 0.9;
}

.desktop-icon span {
    font-size: 11px;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    text-align: center;
    line-height: 1.2;
}

/* ShelfSuite shelves container */
.shelves-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-left: 60px;
}

/* Individual shelf */
.shelf {
    border-radius: 12px;
    padding: 14px 18px;
    width: 520px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
}

.shelf-deepocean {
    background: rgba(25, 40, 58, 0.92);
    border-color: rgba(71, 126, 199, 0.2);
}

.shelf-forest {
    background: rgba(28, 48, 38, 0.92);
    border-color: rgba(76, 145, 95, 0.2);
}

.shelf-terracotta {
    background: rgba(58, 32, 32, 0.92);
    border-color: rgba(180, 90, 80, 0.2);
}

/* Tabs */
.shelf-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    align-items: center;
}

.tab {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: default;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.05);
}

.tab.active-deepocean {
    background: rgba(71, 126, 199, 0.9);
    color: white;
}

.tab.active-forest {
    background: rgba(76, 145, 95, 0.9);
    color: white;
}

.tab.active-terracotta {
    background: rgba(180, 90, 80, 0.9);
    color: white;
}

.gear {
    margin-left: auto;
    color: rgba(255,255,255,0.3);
    font-size: 16px;
}

/* Icons grid */
.icon-grid {
    display: flex;
    gap: 24px;
    padding: 4px 8px;
}

.icon-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 64px;
}

.icon-item svg {
    width: 40px;
    height: 40px;
    stroke: rgba(255,255,255,0.85);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.icon-item span {
    font-size: 10.5px;
    color: rgba(255,255,255,0.75);
    text-align: center;
}

/* Windows 11 Taskbar */
.taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(30px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    z-index: 10;
}

.taskbar-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
}

.taskbar-icon svg {
    width: 22px;
    height: 22px;
    stroke: rgba(255,255,255,0.7);
    fill: none;
    stroke-width: 1.5;
}

.taskbar-icon.active {
    background: rgba(255,255,255,0.08);
}

.taskbar-icon.active::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 16px;
    height: 3px;
    background: #60cdff;
    border-radius: 2px;
}

/* System tray */
.system-tray {
    position: absolute;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
}

/* Windows start button */
.start-btn svg {
    fill: rgba(255,255,255,0.85);
    stroke: none;
}

/* Search */
.search-bar {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 60px;
    display: none;
}
</style>
</head>
<body>
<div class="desktop">
    <!-- Desktop icons left side -->
    <div class="desktop-icons">
        <div class="desktop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18"/>
                <path d="M9 21V9"/>
            </svg>
            <span>Recycle Bin</span>
        </div>
        <div class="desktop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#60cdff" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            <span>Edge</span>
        </div>
    </div>

    <!-- ShelfSuite shelves -->
    <div class="shelves-container">
        <!-- Shelf 1: Folders / DeepOcean -->
        <div class="shelf shelf-deepocean">
            <div class="shelf-tabs">
                <div class="tab active-deepocean">Personal</div>
                <div class="tab">Cloud</div>
                <div class="tab">Drives</div>
                <span class="gear">&#x2699;</span>
            </div>
            <div class="icon-grid">
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
                    <span>Documents</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Pictures</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    <span>Music</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span>Videos</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Downloads</span>
                </div>
            </div>
        </div>

        <!-- Shelf 2: Apps / Forest -->
        <div class="shelf shelf-forest">
            <div class="shelf-tabs">
                <div class="tab active-forest">Internet</div>
                <div class="tab">Work</div>
                <div class="tab">Entertain</div>
                <div class="tab">Tools</div>
                <span class="gear">&#x2699;</span>
            </div>
            <div class="icon-grid">
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span>Browser</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>
                    <span>Email</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>Chat</span>
                </div>
            </div>
        </div>

        <!-- Shelf 3: Bookmarks / Terracotta -->
        <div class="shelf shelf-terracotta">
            <div class="shelf-tabs">
                <div class="tab active-terracotta">Social</div>
                <div class="tab">Work</div>
                <div class="tab">News</div>
                <span class="gear">&#x2699;</span>
            </div>
            <div class="icon-grid">
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span>YouTube</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
                    <span>Reddit</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
                    <span>Twitter</span>
                </div>
                <div class="icon-item">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Instagram</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Windows 11 Taskbar -->
    <div class="taskbar">
        <!-- Start -->
        <div class="taskbar-icon start-btn">
            <svg viewBox="0 0 24 24" width="22" height="22">
                <rect x="1" y="1" width="10" height="10" rx="1" fill="rgba(255,255,255,0.85)"/>
                <rect x="13" y="1" width="10" height="10" rx="1" fill="rgba(255,255,255,0.85)"/>
                <rect x="1" y="13" width="10" height="10" rx="1" fill="rgba(255,255,255,0.85)"/>
                <rect x="13" y="13" width="10" height="10" rx="1" fill="rgba(255,255,255,0.85)"/>
            </svg>
        </div>
        <!-- Search -->
        <div class="taskbar-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <!-- File Explorer -->
        <div class="taskbar-icon active" style="position:relative;">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <!-- Edge -->
        <div class="taskbar-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <!-- Terminal -->
        <div class="taskbar-icon">
            <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        </div>

        <!-- System Tray -->
        <div class="system-tray">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="rgba(255,255,255,0.7)"/></svg>
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
            <span>10:34 AM</span>
            <span style="margin-left:2px;">3/30/2026</span>
        </div>
    </div>
</div>
</body>
</html>
